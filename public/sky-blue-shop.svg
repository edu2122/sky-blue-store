<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 600" width="100%" height="100%">
  <defs>
    <!-- Filtro para sombras 3D -->
    <filter id="sombra" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#000000" flood-opacity="0.6"/>
    </filter>

    <!-- Degradado Azul Marino para el Escudo -->
    <linearGradient id="navyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#001F3F" />
      <stop offset="100%" stop-color="#000814" />
    </linearGradient>

    <!-- Degradado Azul Celeste (Skyblue) para la Camiseta -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C9FF" />
      <stop offset="100%" stop-color="#0072FF" />
    </linearGradient>

    <!-- Degradado Dorado Metálico para bordes y estrellas -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BF953F" />
      <stop offset="30%" stop-color="#FCF6BA" />
      <stop offset="70%" stop-color="#B38728" />
      <stop offset="100%" stop-color="#FBF5B7" />
    </linearGradient>
  </defs>

  <!-- Borde exterior del Escudo (Dorado) -->
  <path d="M 250,20 L 450,80 L 450,320 C 450,470 300,550 250,580 C 200,550 50,470 50,320 L 50,80 Z" fill="url(#goldGrad)" filter="url(#sombra)"/>
  
  <!-- Fondo interior del Escudo (Azul Marino) -->
  <path d="M 250,32 L 435,88 L 435,315 C 435,455 295,530 250,560 C 205,530 65,455 65,315 L 65,88 Z" fill="url(#navyGrad)"/>

  <!-- 3 Estrellas de Campeón en la cima -->
  <text x="250" y="115" font-family="Arial" font-size="32" fill="url(#goldGrad)" text-anchor="middle" filter="url(#sombra)">★   ★   ★</text>

  <!-- SILUETA DE LA CAMISETA PREMIUM -->
  <g filter="url(#sombra)">
    <!-- Base de la camiseta (Skyblue) -->
    <path d="M 210,140 L 160,140 L 120,190 L 150,220 L 170,190 L 170,360 C 200,375 300,375 330,360 L 330,190 L 350,220 L 380,190 L 340,140 L 290,140 C 270,180 230,180 210,140 Z" fill="url(#skyGrad)" stroke="#ffffff" stroke-width="3"/>
    
    <!-- Cuello en V (Blanco) -->
    <path d="M 290,140 C 270,195 230,195 210,140 C 230,170 270,170 290,140 Z" fill="#ffffff"/>
    
    <!-- Franja deportiva en el pecho (Chevron Blanco) -->
    <path d="M 170,210 L 250,250 L 330,210 L 330,230 L 250,270 L 170,230 Z" fill="#ffffff" opacity="0.9"/>
    
    <!-- Número 10 -->
    <text x="250" y="335" font-family="'Arial Black', sans-serif" font-size="50" font-weight="900" font-style="italic" fill="#ffffff" text-anchor="middle">10</text>
  </g>

  <!-- 8 Estrellas de Venezuela -->
  <text x="250" y="405" font-family="Arial" font-size="16" fill="url(#goldGrad)" text-anchor="middle" letter-spacing="5" filter="url(#sombra)">★ ★ ★ ★ ★ ★ ★ ★</text>

  <!-- CINTA / BANNER PRINCIPAL: SKYBLUE -->
  <path d="M 20,430 L 480,430 L 450,500 L 50,500 Z" fill="#ffffff" stroke="url(#goldGrad)" stroke-width="5" filter="url(#sombra)"/>
  
  <!-- Texto SKYBLUE -->
  <text x="250" y="482" font-family="'Arial Black', sans-serif" font-size="44" font-weight="900" font-style="italic" fill="#001F3F" text-anchor="middle" letter-spacing="1">SKYBLUE</text>

  <!-- CINTA INFERIOR: SHOP VE -->
  <path d="M 140,500 L 360,500 L 340,550 L 160,550 Z" fill="url(#skyGrad)" stroke="url(#goldGrad)" stroke-width="3" filter="url(#sombra)"/>
  
  <!-- Texto SHOP VE -->
  <text x="250" y="535" font-family="'Arial Black', sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="3">SHOP VE</text>

</svg>